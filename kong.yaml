# swarm-config Kong Gateway Configuration
# Global plugins only - service routing is defined in project.json

plugins:
  # ACME Plugin for automatic SSL/TLS certificate management via Let's Encrypt
  - name: acme
    config:
      account_email: ${TECH_EMAIL}
      tos_accepted: true
      storage: redis
      storage_config:
        redis:
          host: redis
          port: 6379
      # domains are automatically set from all registered domains

  # Bot Detection to identify and reject bot traffic
  - name: bot-detection
    config:
      allow:
        - Nextcloud-Server-Crawler

  # HSTS Header for all services
  - name: response-transformer
    config:
      add:
        headers:
          - "Strict-Transport-Security: max-age=15552000; includeSubDomains"

  # Default upload size limit
  - name: request-size-limiting
    config:
      allowed_payload_size: 10
      size_unit: megabytes
      require_content_length: false
